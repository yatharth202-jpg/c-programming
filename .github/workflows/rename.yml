name: Auto Rename Q Files

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Rename Q files
        run: |
          for file in Q*; do
            if [[ "$file" =~ ^Q([0-9]+)(\..+)$ ]]; then
              num=${BASH_REMATCH[1]}
              ext=${BASH_REMATCH[2]}
              new=$(printf "Q%03d%s" "$num" "$ext")
              if [ "$file" != "$new" ]; then
                mv "$file" "$new"
              fi
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto rename Q files"
          git push
